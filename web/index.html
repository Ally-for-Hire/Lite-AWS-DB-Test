<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Versioned Notes</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <div>
          <h1>Versioned Notes</h1>
          <p>Create notes and keep a clear version history.</p>
        </div>
        <button id="reload" type="button">Reload</button>
      </header>

      <section class="layout">
        <aside class="panel">
          <h2>Create Note</h2>
          <form id="create-form" class="stack">
            <input id="new-title" name="title" maxlength="120" placeholder="Title" required />
            <textarea id="new-content" name="content" rows="6" placeholder="Content"></textarea>
            <button type="submit">Create</button>
          </form>
        </aside>

        <section class="panel">
          <div class="panel-head">
            <h2>Notes</h2>
            <span id="notes-count">0</span>
          </div>
          <div id="notes-empty" class="muted">No notes yet.</div>
          <div id="notes-list" class="stack"></div>
        </section>

        <section class="panel editor">
          <div class="panel-head">
            <h2 id="editor-title-label">Editor</h2>
            <span id="editor-status" class="muted">No note selected</span>
          </div>

          <form id="editor-form" class="stack">
            <input id="editor-title" name="title" maxlength="120" placeholder="Title" disabled required />
            <textarea id="editor-content" name="content" rows="12" placeholder="Content" disabled></textarea>
            <div class="actions">
              <button id="save" type="submit" disabled>Save Version</button>
              <button id="undo" type="button" disabled>Undo</button>
              <button id="redo" type="button" disabled>Redo</button>
            </div>
          </form>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>Version History</h2>
            <span id="versions-count">0</span>
          </div>
          <div id="versions-empty" class="muted">Select a note.</div>
          <div id="versions-list" class="stack"></div>
        </section>
      </section>
    </main>

    <div id="message" class="message" hidden></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
